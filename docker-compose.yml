services:
  osrm-data-builder:
    image: osrm-data-builder:latest
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.builder
      args:
        - PROFILE=${PROFILE:-car}
    profiles:
      - build

  osrm:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.osrm
      args:
        - PROFILE=${PROFILE:-car}
    container_name: osrm-backend
    ports:
      - "5000:5000"
    command: sh -c "osrm-routed --algorithm mld --max-trip-size 200 /data/car/costa-rica-latest.osrm"
    restart: always

  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: osrm-api-gateway
    ports:
      - "8080:8000"
    environment:
      - OSRM_BASE_URL=http://osrm-backend:5000
    depends_on:
      - osrm
    restart: always

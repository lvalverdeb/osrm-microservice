services:
  osrm:
    build:
      context: .
      dockerfile: Dockerfile.osrm
    container_name: osrm-backend
    ports:
      - "5000:5000"
    command: osrm-routed --algorithm mld /data/costa-rica-latest.osrm
    restart: always

  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: osrm-api-gateway
    ports:
      - "8080:8000"
    environment:
      - OSRM_BASE_URL=http://osrm-backend:5000
    depends_on:
      - osrm
    restart: always
